name: Stale Branches

on: workflow_dispatch

jobs:
  stale-branch:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: abhishekdiwan1227/common-actions/stale-branches@master
        id: stale-branch
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          echo "# deleted branches" >> $GITHUB_STEP_SUMMARY
          for branch in ${{ steps.stale-branch.outcome.branch-list }}; do
            echo "- $branch" >> $GITHUB_STEP_SUMMARY
          done
